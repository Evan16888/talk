<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Speech Practice</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0a0a0f;
  --surface: #14141f;
  --surface2: #1e1e2e;
  --border: #2a2a3e;
  --text: #e8e8f0;
  --text2: #8888a8;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --accent-glow: rgba(108, 92, 231, 0.3);
  --green: #00cec9;
  --orange: #fdcb6e;
  --radius: 14px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10, 10, 15, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.header h1 {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent2), var(--green));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.mode-toggle {
  display: flex;
  gap: 6px;
}

.mode-btn {
  padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.mode-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 2px 12px var(--accent-glow);
}

/* Page Selector */
.page-selector {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding-bottom: 2px;
}

.page-selector::-webkit-scrollbar { display: none; }

.page-btn {
  flex-shrink: 0;
  width: 38px;
  height: 38px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.page-btn.active {
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  border-color: transparent;
  color: #fff;
  box-shadow: 0 2px 16px var(--accent-glow);
  transform: scale(1.08);
}

.page-btn.completed {
  border-color: var(--green);
  color: var(--green);
}

/* Content */
.content {
  padding: 16px;
  padding-bottom: 100px;
}

.page-title {
  font-size: 15px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  font-weight: 600;
  margin-bottom: 16px;
}

/* Sentence Card */
.sentence-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 12px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.sentence-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--border);
  border-radius: 0 2px 2px 0;
  transition: background 0.3s;
}

.sentence-card.active::before {
  background: linear-gradient(180deg, var(--accent), var(--green));
}

.sentence-card.active {
  border-color: var(--accent);
  box-shadow: 0 4px 24px var(--accent-glow);
}

.sentence-card.completed::before {
  background: var(--green);
}

.sentence-card.completed {
  border-color: rgba(0, 206, 201, 0.3);
  opacity: 0.7;
}

.sentence-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.sentence-num {
  font-size: 13px;
  color: var(--text2);
  font-weight: 600;
  background: var(--surface2);
  padding: 4px 10px;
  border-radius: 6px;
}

.sentence-play {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  box-shadow: 0 2px 12px var(--accent-glow);
}

.sentence-play:active {
  transform: scale(0.92);
}

.sentence-play.playing {
  background: linear-gradient(135deg, var(--green), #00b894);
  animation: pulse-ring 1.5s infinite;
}

@keyframes pulse-ring {
  0% { box-shadow: 0 0 0 0 rgba(0, 206, 201, 0.4); }
  70% { box-shadow: 0 0 0 10px rgba(0, 206, 201, 0); }
  100% { box-shadow: 0 0 0 0 rgba(0, 206, 201, 0); }
}

.sentence-text {
  font-size: 19px;
  line-height: 1.8;
  color: var(--text);
  letter-spacing: 0.3px;
  word-spacing: 1px;
}

.sentence-text .word {
  display: inline;
  cursor: pointer;
  padding: 2px 1px;
  border-radius: 4px;
  transition: all 0.15s;
  position: relative;
}

.sentence-text .word:active {
  background: var(--accent-glow);
  color: var(--accent2);
}

.sentence-text .word.word-playing {
  background: rgba(108, 92, 231, 0.25);
  color: var(--accent2);
}

/* Full Page Mode */
.full-page-view {
  display: none;
}

.full-page-view.active {
  display: block;
}

.full-text-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
}

.full-text-card .sentence-text {
  font-size: 20px;
  line-height: 1.9;
}

.full-play-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 16px;
  border-radius: var(--radius);
  border: none;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  color: #fff;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 20px var(--accent-glow);
  margin-bottom: 12px;
}

.full-play-btn:active {
  transform: scale(0.97);
}

.full-play-btn.playing {
  background: linear-gradient(135deg, var(--green), #00b894);
}

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(10, 10, 15, 0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 10px 16px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  display: flex;
  gap: 10px;
  z-index: 100;
}

.nav-btn {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.nav-btn:active {
  transform: scale(0.96);
}

.nav-btn.primary {
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  border-color: transparent;
  color: #fff;
  box-shadow: 0 2px 16px var(--accent-glow);
}

.nav-btn:disabled {
  opacity: 0.4;
  pointer-events: none;
}

/* Speed Control */
.speed-control {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  padding-top: 8px;
}

.speed-label {
  font-size: 13px;
  color: var(--text2);
  font-weight: 600;
  white-space: nowrap;
}

.speed-slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  outline: none;
}

.speed-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 2px 8px var(--accent-glow);
}

.speed-value {
  font-size: 14px;
  color: var(--accent2);
  font-weight: 700;
  min-width: 36px;
  text-align: center;
}

/* Word tooltip */
.word-tooltip {
  position: fixed;
  background: var(--surface2);
  border: 1px solid var(--accent);
  border-radius: 10px;
  padding: 10px 16px;
  font-size: 16px;
  color: var(--accent2);
  font-weight: 600;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 200;
  pointer-events: none;
  opacity: 0;
  transform: translateY(4px);
  transition: all 0.2s;
}

.word-tooltip.show {
  opacity: 1;
  transform: translateY(0);
}

/* Sentence view */
.sentence-view { display: block; }
.sentence-view.hidden { display: none; }

/* Progress bar */
.progress-bar {
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  overflow: hidden;
  margin-top: 8px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  border-radius: 1px;
  transition: width 0.3s;
}

/* Animations */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.sentence-card { animation: fadeInUp 0.35s ease both; }
.sentence-card:nth-child(2) { animation-delay: 0.05s; }
.sentence-card:nth-child(3) { animation-delay: 0.1s; }
.sentence-card:nth-child(4) { animation-delay: 0.15s; }
.sentence-card:nth-child(5) { animation-delay: 0.2s; }
.sentence-card:nth-child(6) { animation-delay: 0.25s; }
.sentence-card:nth-child(7) { animation-delay: 0.3s; }
.sentence-card:nth-child(8) { animation-delay: 0.35s; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>🎤 Speech Practice</h1>
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="sentence">逐句</button>
      <button class="mode-btn" data-mode="full">整页</button>
    </div>
  </div>
  <div class="page-selector" id="pageSelector"></div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="speed-control">
    <span class="speed-label">语速</span>
    <input type="range" class="speed-slider" id="speedSlider" min="0.5" max="1.5" step="0.05" value="0.92">
    <span class="speed-value" id="speedValue">0.92x</span>
  </div>
</div>

<div class="content" id="content">
  <div class="sentence-view" id="sentenceView"></div>
  <div class="full-page-view" id="fullPageView"></div>
</div>

<div class="bottom-nav">
  <button class="nav-btn" id="prevBtn" disabled>◀ 上一页</button>
  <button class="nav-btn primary" id="playAllBtn">▶ 播放全部</button>
  <button class="nav-btn" id="nextBtn">下一页 ▶</button>
</div>

<div class="word-tooltip" id="wordTooltip"></div>

<script>
const pages = [
  {
    title: "Page 1 · Opening",
    sentences: [
      "Good afternoon everyone,",
      "I'm [name].",
      "Today we're going to talk about Apple.",
      "We'll use a structured way to look at its antitrust challenges and then suggest some solutions."
    ]
  },
  {
    title: "Page 2 · Introduction",
    sentences: [
      "So first, a quick introduction to Apple.",
      "It's one of the most valuable tech companies, with over 1.5 billion devices in use.",
      "But right now, it's facing quite serious antitrust issues in the US, Europe, and other regions.",
      "The main problems are: the 30% App Store commission, limits on third-party payments, iMessage not being cross-platform, and high switching costs.",
      "So to address this, we suggest three main actions: open app distribution, adjust the commission model, and allow more payment options."
    ]
  },
  {
    title: "Page 3 · Problem Definition",
    sentences: [
      "Now let's define the problem.",
      "Apple has a very strong ecosystem and makes a lot of service revenue.",
      "But at the same time, many countries are investigating it.",
      "The key issues are high fees, no alternative app stores, restricted payments, and user lock-in.",
      "So the challenge here is: how can Apple follow regulations, but still keep its revenue and security?"
    ]
  },
  {
    title: "Page 4 · Monopoly Accusation",
    sentences: [
      "So why is Apple being accused of monopoly?",
      "Mainly two reasons.",
      "First, market power. Apple controls the App Store, charges 30%, and doesn't allow other app stores.",
      "Second, ecosystem lock-in. iMessage doesn't work across platforms, NFC is limited to Apple Pay, and switching is costly.",
      "So both users and developers become very dependent on Apple."
    ]
  },
  {
    title: "Page 5 · Solutions Overview",
    sentences: [
      "Now let's look at the solutions.",
      "There are two main directions: breaking the distribution monopoly and reducing lock-in.",
      "So we suggest things like: tiered fees, opening app distribution, allowing more payment options, improving messaging, opening NFC, and enabling data portability.",
      "Overall, the idea is to make the ecosystem more open, but still keep control."
    ]
  },
  {
    title: "Page 6 · Prioritisation",
    sentences: [
      "Here we prioritise the solutions using a 2×2 matrix.",
      "The most important ones are the \"Do First\" actions: high impact and easy to implement.",
      "These include opening app distribution, adjusting fees, and allowing external payments.",
      "Quick wins include cross-platform messaging.",
      "Some actions, like data portability, are important but take more time.",
      "So we focus on what is both impactful and doable first."
    ]
  },
  {
    title: "Page 7 · Workplan",
    sentences: [
      "This is our workplan, focusing on three areas.",
      "First, app distribution. How can Apple allow sideloading but still stay secure?",
      "We suggest allowing it with a verification process.",
      "Second, commission fees. How can Apple reduce fees but still keep revenue?",
      "We suggest tiered fees and external payments.",
      "Third, payment access. How can Apple open NFC safely?",
      "We suggest controlled APIs and monitoring transactions."
    ]
  },
  {
    title: "Page 8 · Deep Dive: Tiered Fees",
    sentences: [
      "Here we go deeper into one solution: tiered fees.",
      "The key question is how to lower fees but still keep revenue.",
      "We compare competitors like Google and Samsung, and test different fee levels.",
      "What we find is that lower fees can attract more developers and increase spending.",
      "So even if commission drops, Apple can gain volume and reduce legal risk."
    ]
  },
  {
    title: "Page 9 · Conclusion",
    sentences: [
      "Finally, our conclusion.",
      "First, the situation: Apple has a strong ecosystem and high revenue.",
      "Second, the problem: it faces global antitrust pressure.",
      "And third, the solution: open app distribution, introduce tiered fees and external payments, and open NFC.",
      "These help Apple stay compliant while still protecting its business."
    ]
  }
];

let currentPage = 0;
let currentSentence = 0;
let mode = 'sentence';
let speechRate = 0.92;
let isPlayingAll = false;
let completedSentences = new Set();
let completedPages = new Set();

const synth = window.speechSynthesis;
let englishVoice = null;

const preferredVoices = [
  'Samantha (Enhanced)', 'Samantha (Premium)', 'Samantha',
  'Karen (Enhanced)', 'Karen (Premium)', 'Karen',
  'Daniel (Enhanced)', 'Daniel (Premium)', 'Daniel',
  'Moira (Enhanced)', 'Moira',
  'Tessa (Enhanced)', 'Tessa',
  'Google US English', 'Google UK English Female',
  'Microsoft Zira', 'Microsoft Jenny',
  'English United States',
];

function loadVoices() {
  const voices = synth.getVoices();
  if (!voices.length) return;

  const enVoices = voices.filter(v => v.lang.startsWith('en'));

  for (const name of preferredVoices) {
    const found = enVoices.find(v => v.name.includes(name));
    if (found) { englishVoice = found; return; }
  }

  const enhanced = enVoices.find(v =>
    /enhanced|premium|natural|neural/i.test(v.name)
  );
  if (enhanced) { englishVoice = enhanced; return; }

  const nonCompact = enVoices.find(v => !/compact/i.test(v.name));
  englishVoice = nonCompact || enVoices[0] || voices[0];
}
synth.onvoiceschanged = loadVoices;
setTimeout(loadVoices, 100);
setTimeout(loadVoices, 500);
loadVoices();

function speak(text, rate, onEnd) {
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = rate || speechRate;
  u.pitch = 1.02;
  u.volume = 1;
  if (englishVoice) u.voice = englishVoice;
  if (onEnd) u.onend = onEnd;
  u.onerror = () => { if (onEnd) onEnd(); };

  // Chrome bug workaround: long utterances get cut off without periodic resume
  let keepAlive;
  if (/Chrome/i.test(navigator.userAgent) && !/Edg/i.test(navigator.userAgent)) {
    keepAlive = setInterval(() => {
      if (synth.speaking && !synth.paused) { synth.pause(); synth.resume(); }
      else clearInterval(keepAlive);
    }, 10000);
    const origEnd = u.onend;
    u.onend = (e) => { clearInterval(keepAlive); if (origEnd) origEnd(e); };
    const origErr = u.onerror;
    u.onerror = (e) => { clearInterval(keepAlive); if (origErr) origErr(e); };
  }

  synth.speak(u);
}

function speakWord(word) {
  synth.cancel();
  const clean = word.replace(/[^a-zA-Z'-]/g, '');
  if (!clean) return;
  const u = new SpeechSynthesisUtterance(clean);
  u.lang = 'en-US';
  u.rate = 0.75;
  u.pitch = 1.02;
  u.volume = 1;
  if (englishVoice) u.voice = englishVoice;
  synth.speak(u);
}

function makeClickableWords(text) {
  return text.split(/(\s+)/).map(part => {
    if (/^\s+$/.test(part)) return part;
    return `<span class="word" data-word="${part.replace(/"/g, '&quot;')}">${part}</span>`;
  }).join('');
}

function renderPageSelector() {
  const el = document.getElementById('pageSelector');
  el.innerHTML = pages.map((_, i) =>
    `<button class="page-btn ${i === currentPage ? 'active' : ''} ${completedPages.has(i) ? 'completed' : ''}" data-page="${i}">${i + 1}</button>`
  ).join('');
}

function renderSentenceView() {
  const page = pages[currentPage];
  const el = document.getElementById('sentenceView');
  el.innerHTML = `<div class="page-title">${page.title}</div>` +
    page.sentences.map((s, i) => {
      const key = `${currentPage}-${i}`;
      const isActive = i === currentSentence;
      const isCompleted = completedSentences.has(key);
      return `<div class="sentence-card ${isActive ? 'active' : ''} ${isCompleted ? 'completed' : ''}" data-idx="${i}">
        <div class="sentence-header">
          <span class="sentence-num">${i + 1} / ${page.sentences.length}</span>
          <button class="sentence-play" data-idx="${i}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </button>
        </div>
        <div class="sentence-text">${makeClickableWords(s)}</div>
      </div>`;
    }).join('');
}

function renderFullPageView() {
  const page = pages[currentPage];
  const el = document.getElementById('fullPageView');
  const allText = page.sentences.join(' ');
  el.innerHTML = `<div class="page-title">${page.title}</div>
    <button class="full-play-btn" id="fullPlayBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      播放整页
    </button>
    <div class="full-text-card">
      <div class="sentence-text">${makeClickableWords(allText)}</div>
    </div>`;

  document.getElementById('fullPlayBtn')?.addEventListener('click', () => {
    const btn = document.getElementById('fullPlayBtn');
    btn.classList.add('playing');
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 播放中...`;
    speak(allText, speechRate, () => {
      btn.classList.remove('playing');
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> 播放整页`;
      markPageCompleted();
    });
  });
}

function render() {
  renderPageSelector();
  if (mode === 'sentence') {
    document.getElementById('sentenceView').classList.remove('hidden');
    document.getElementById('fullPageView').classList.remove('active');
    renderSentenceView();
  } else {
    document.getElementById('sentenceView').classList.add('hidden');
    document.getElementById('fullPageView').classList.add('active');
    renderFullPageView();
  }
  updateProgress();
  updateNavButtons();
}

function updateProgress() {
  const total = pages.reduce((a, p) => a + p.sentences.length, 0);
  const done = completedSentences.size;
  document.getElementById('progressFill').style.width = `${(done / total) * 100}%`;
}

function updateNavButtons() {
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage === pages.length - 1;
}

function markSentenceCompleted(pageIdx, sentIdx) {
  completedSentences.add(`${pageIdx}-${sentIdx}`);
  const page = pages[pageIdx];
  const allDone = page.sentences.every((_, i) => completedSentences.has(`${pageIdx}-${i}`));
  if (allDone) completedPages.add(pageIdx);
}

function markPageCompleted() {
  pages[currentPage].sentences.forEach((_, i) => {
    completedSentences.add(`${currentPage}-${i}`);
  });
  completedPages.add(currentPage);
  render();
}

function playSentence(idx) {
  synth.cancel();
  isPlayingAll = false;
  currentSentence = idx;
  render();

  const card = document.querySelector(`.sentence-card[data-idx="${idx}"]`);
  const btn = card?.querySelector('.sentence-play');
  if (btn) btn.classList.add('playing');

  card?.scrollIntoView({ behavior: 'smooth', block: 'center' });

  speak(pages[currentPage].sentences[idx], speechRate, () => {
    if (btn) btn.classList.remove('playing');
    markSentenceCompleted(currentPage, idx);
    render();
  });
}

function playAll() {
  if (isPlayingAll) {
    synth.cancel();
    isPlayingAll = false;
    updatePlayAllBtn();
    return;
  }

  isPlayingAll = true;
  updatePlayAllBtn();

  let idx = currentSentence;
  function playNext() {
    if (!isPlayingAll || idx >= pages[currentPage].sentences.length) {
      isPlayingAll = false;
      updatePlayAllBtn();
      if (idx >= pages[currentPage].sentences.length) markPageCompleted();
      return;
    }
    currentSentence = idx;
    render();
    const card = document.querySelector(`.sentence-card[data-idx="${idx}"]`);
    card?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    const btn = card?.querySelector('.sentence-play');
    if (btn) btn.classList.add('playing');

    speak(pages[currentPage].sentences[idx], speechRate, () => {
      markSentenceCompleted(currentPage, idx);
      idx++;
      playNext();
    });
  }
  playNext();
}

function updatePlayAllBtn() {
  const btn = document.getElementById('playAllBtn');
  if (isPlayingAll) {
    btn.innerHTML = '⏸ 暂停';
    btn.classList.add('playing');
  } else {
    btn.innerHTML = '▶ 播放全部';
    btn.classList.remove('playing');
  }
}

// Event listeners
document.getElementById('pageSelector').addEventListener('click', e => {
  const btn = e.target.closest('.page-btn');
  if (!btn) return;
  synth.cancel();
  isPlayingAll = false;
  currentPage = parseInt(btn.dataset.page);
  currentSentence = 0;
  render();
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    synth.cancel();
    isPlayingAll = false;
    mode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

document.getElementById('content').addEventListener('click', e => {
  const word = e.target.closest('.word');
  if (word) {
    e.stopPropagation();
    const w = word.dataset.word;
    speakWord(w);

    document.querySelectorAll('.word.word-playing').forEach(el => el.classList.remove('word-playing'));
    word.classList.add('word-playing');
    setTimeout(() => word.classList.remove('word-playing'), 800);

    const tooltip = document.getElementById('wordTooltip');
    const rect = word.getBoundingClientRect();
    tooltip.textContent = w.replace(/[^a-zA-Z'-]/g, '');
    tooltip.style.left = `${rect.left + rect.width / 2 - 40}px`;
    tooltip.style.top = `${rect.top - 40}px`;
    tooltip.classList.add('show');
    setTimeout(() => tooltip.classList.remove('show'), 1000);
    return;
  }

  const playBtn = e.target.closest('.sentence-play');
  if (playBtn) {
    playSentence(parseInt(playBtn.dataset.idx));
    return;
  }

  const card = e.target.closest('.sentence-card');
  if (card && mode === 'sentence') {
    const idx = parseInt(card.dataset.idx);
    currentSentence = idx;
    render();
  }
});

document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentPage > 0) {
    synth.cancel();
    isPlayingAll = false;
    currentPage--;
    currentSentence = 0;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
});

document.getElementById('nextBtn').addEventListener('click', () => {
  if (currentPage < pages.length - 1) {
    synth.cancel();
    isPlayingAll = false;
    currentPage++;
    currentSentence = 0;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
});

document.getElementById('playAllBtn').addEventListener('click', () => {
  if (mode === 'sentence') {
    playAll();
  } else {
    document.getElementById('fullPlayBtn')?.click();
  }
});

document.getElementById('speedSlider').addEventListener('input', e => {
  speechRate = parseFloat(e.target.value);
  const display = speechRate % 1 === 0 ? speechRate.toFixed(1) : speechRate.toFixed(2).replace(/0$/, '');
  document.getElementById('speedValue').textContent = display + 'x';
});

render();
</script>
</body>
</html>
